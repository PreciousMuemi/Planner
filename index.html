<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyPlanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="workspace">
    <header class="appbar">
      <div class="appbar-left">
        <span class="dot"></span>
        <span class="app-name">Planner</span>
      </div>
      <div class="appbar-right">
        <button type="button">Share</button>
      </div>
    </header>

    <aside class="sidebar">
      <h2>Private</h2>
      <nav>
        <a href="#" class="is-page">🏠 Home</a>
        <a href="#" class="is-page is-active">🗒️ That Girl Life Planner</a>
        <a href="#" class="is-page">✅ Tasks</a>
        <a href="#" class="is-page">🎯 Goals</a>
        <a href="#" class="is-page">✨ Completed</a>
      </nav>
    </aside>

    <main class="page">
      <div class="cover"></div>
      <header class="page-head">
        <p class="crumb">Personal / Planner</p>
        <div class="title-row">
          <span class="icon">🗒️</span>
          <h1>That Girl Life Planner</h1>
        </div>
        <p class="subtitle">Daily tasks and long-term goals</p>
        <div class="progress-wrap">
          <span id="progressText">0% done</span>
          <div class="progress-track">
            <div id="progressBar"></div>
          </div>
        </div>
      </header>

      <section class="grid">
        <article class="panel">
          <h2>✅ Add Task</h2>
          <form id="taskForm" class="form">
            <label>
              <span>Title</span>
              <input id="taskTitle" type="text" maxlength="100" placeholder="Write a task" />
            </label>
            <label>
              <span>Due date</span>
              <input id="taskDueDate" type="date" />
            </label>
            <label>
              <span>Priority</span>
              <select id="taskPriority">
                <option value="Low">Low</option>
                <option value="Medium" selected>Medium</option>
                <option value="High">High</option>
              </select>
            </label>
            <button type="submit">Add Task</button>
            <p id="taskError" class="error"></p>
          </form>
        </article>

        <article class="panel">
          <h2>🎯 Add Goal</h2>
          <form id="goalForm" class="form">
            <label>
              <span>Goal</span>
              <input id="goalTitle" type="text" maxlength="120" placeholder="Write a long-term goal" />
            </label>
            <button type="submit">Add Goal</button>
            <p id="goalError" class="error"></p>
          </form>
        </article>

        <article class="panel wide">
          <div class="list-head">
            <h2>📋 Tasks</h2>
            <div class="filters" role="tablist" aria-label="Task filters">
              <button class="filter is-active" data-filter="all" type="button">All</button>
              <button class="filter" data-filter="pending" type="button">Pending</button>
              <button class="filter" data-filter="completed" type="button">Completed</button>
            </div>
          </div>
          <ul id="taskList" class="list"></ul>
        </article>

        <article class="panel wide">
          <h2>🌱 Goals</h2>
          <ul id="goalList" class="list"></ul>
        </article>

        <article class="panel wide">
          <h2>✨ Completed Items</h2>
          <ul id="completedList" class="list completed"></ul>
        </article>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
